name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        type: choice
        options: [staging, production]
        default: staging

permissions:
  contents: read
  deployments: write

jobs:
  deploy-frontend:
    name: Deploy frontend (Vercel)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Vercel CLI
        run: pnpm add -g vercel@latest

      - name: Pull Vercel env
        working-directory: apps/demo
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=${{ inputs.environment == 'production' && 'production' || 'preview' }} --token $VERCEL_TOKEN

      - name: Build
        working-directory: apps/demo
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel build ${{ inputs.environment == 'production' && '--prod' || '' }} --token $VERCEL_TOKEN

      - name: Deploy
        working-directory: apps/demo
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: vercel deploy --prebuilt ${{ inputs.environment == 'production' && '--prod' || '' }} --token $VERCEL_TOKEN

  deploy-backend:
    name: Deploy backend (Render)
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - name: Trigger Render deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          curl -sf "$RENDER_DEPLOY_HOOK" \
            || (echo "Render deploy hook failed — check RENDER_DEPLOY_HOOK secret" && exit 1)
          echo "Render deploy triggered successfully"
